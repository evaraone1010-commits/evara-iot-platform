server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Add CSP header to allow Firebase Auth and Google APIs
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://*.railway.app wss://*.railway.app https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://firestore.googleapis.com https://firebaseinstallations.googleapis.com https://firebasestorage.googleapis.com" always;

    # Serve Static Files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Backend (if running in same network/compose)
    # env var replacement usually done via entrypoint script
    location /api {
        proxy_pass http://evara-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
