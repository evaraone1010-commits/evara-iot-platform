name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  trivy:
    name: Trivy image scan
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: evara-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          docker build -f backend/Dockerfile -t ${{ env.IMAGE_NAME }}:${{ github.sha }} backend

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: (Optional) Enable ECR image scanning on push
        if: ${{ secrets.AWS_REGION && secrets.AWS_ACCESS_KEY_ID }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: (Optional) Configure ECR repository scan-on-push
        if: ${{ secrets.AWS_REGION && secrets.AWS_ACCESS_KEY_ID }}
        run: |
          REPO_NAME=${{ env.IMAGE_NAME }}
          aws ecr put-image-scanning-configuration \
            --repository-name "$REPO_NAME" \
            --image-scanning-configuration scanOnPush=true
